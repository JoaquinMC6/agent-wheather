requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: weather-agent
services:
    weather-agent:
        project: src/temperature
        host: azure.ai.agent
        language: docker
        docker:
            path: Dockerfile
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 0.5Gi
                scale:
                    maxReplicas: 1
                    minReplicas: 1
        kind: hosted
        name: weather-agent
        description: |
            Agent that answers questions about the temperature in different cities.
        metadata:
            authors:
                - Joaquín Carballo
            tags:
                - Azure AI AgentServer
                - Microsoft Agent Framework
        protocols:
            - protocol: responses
              version: ""
        environment_variables:
            - name: FOUNDRY_PROJECT_ENDPOINT
              value: ${FOUNDRY_PROJECT_ENDPOINT}
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
